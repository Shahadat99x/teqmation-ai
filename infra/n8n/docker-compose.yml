services:
  n8n-postgres:
    image: postgres:16-alpine
    container_name: clientflow-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB}
      POSTGRES_USER: ${N8N_POSTGRES_USER}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD}
      TZ: ${N8N_TIMEZONE}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${N8N_POSTGRES_USER} -d ${N8N_POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:1.86.1
    container_name: clientflow-n8n
    restart: unless-stopped
    depends_on:
      n8n-postgres:
        condition: service_healthy
    env_file:
      - ./.env
      - ../../apps/web/.env.local
    ports:
      - "${N8N_HOST_PORT}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: ${N8N_TIMEZONE}
      TZ: ${N8N_TIMEZONE}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
  n8n_postgres_data:
